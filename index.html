<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きょうのよていボード｜絵カード予定表</title>
<style>
  :root {
    --bg: #f5f0e8;
    --paper: #fffef9;
    --ink: #202020;
    --muted: #7a746b;
    --line: #d7cfc2;
    --accent: #ffb84d;
    --accent2: #7cc7ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at top, #fff8e8 0, var(--bg) 45%, #ece3d5 100%);
    color: var(--ink);
    font-family: "Hiragino Sans", "Yu Gothic", Meiryo, system-ui, sans-serif;
  }
  header {
    padding: 18px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 16px;
  }
  h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: .03em;
  }
  .subtitle {
    color: var(--muted);
    font-weight: 700;
    margin-top: 4px;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  button {
    border: 0;
    border-radius: 14px;
    padding: 10px 14px;
    background: #fff;
    box-shadow: 0 3px 0 rgba(0,0,0,.12);
    font-weight: 800;
    cursor: pointer;
    color: var(--ink);
  }
  button.primary { background: var(--accent); }
  button.blue { background: var(--accent2); }
  button.danger { background: #ffd6d6; }
  main { padding: 10px 18px 24px; }
  .board {
    background: var(--paper);
    border: 8px solid #c9b99e;
    border-radius: 28px;
    padding: 18px;
    box-shadow: 0 14px 30px rgba(61,42,16,.18);
    max-width: 1480px;
    margin: 0 auto;
  }
  .row {
    display: grid;
    grid-template-columns: 120px repeat(8, 1fr);
    gap: 10px;
    align-items: stretch;
    margin-bottom: 14px;
  }
  .row:last-child { margin-bottom: 0; }
  .time-label {
    border-radius: 20px;
    border: 3px solid var(--line);
    background: #fff7dc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    writing-mode: vertical-rl;
    letter-spacing: .2em;
  }
  .slot {
    min-height: 170px;
    background: #ffffff;
    border: 3px dashed #cfc6b7;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: .12s transform ease, .12s box-shadow ease;
  }
  .slot:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
  }
  .slot.empty::before {
    content: "＋";
    color: #b8ad9b;
    font-size: 44px;
    font-weight: 900;
  }
  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 4px;
  }
  .card img {
    width: 100%;
    height: 132px;
    object-fit: contain;
    display: block;
  }
  .card .label {
    font-size: 22px;
    font-weight: 900;
    text-align: center;
    line-height: 1.1;
    margin-top: 2px;
  }
  .slot.done {
    opacity: .45;
    background: #eeeeee;
  }
  .slot.done::after {
    content: "できた";
    position: absolute;
    top: 8px;
    right: 8px;
    background: #84d68b;
    color: #07350b;
    border-radius: 999px;
    padding: 4px 8px;
    font-weight: 900;
    font-size: 14px;
  }
  .hint {
    max-width: 1480px;
    margin: 10px auto 0;
    color: var(--muted);
    font-weight: 700;
    font-size: 14px;
  }
  dialog {
    width: min(980px, 94vw);
    border: 0;
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  dialog::backdrop { background: rgba(0,0,0,.35); }
  .dialog-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .dialog-head h2 { margin: 0; font-size: 24px; }
  .picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
    gap: 10px;
    max-height: 62vh;
    overflow: auto;
    padding: 4px;
  }
  .pick-card {
    border: 3px solid #e2d9ca;
    border-radius: 18px;
    background: #fffdf8;
    padding: 8px;
    display: grid;
    place-items: center;
    gap: 6px;
    cursor: pointer;
    min-height: 150px;
  }
  .pick-card:hover { border-color: var(--accent); background: #fff6e3; }
  .pick-card img {
    width: 112px;
    height: 112px;
    object-fit: contain;
  }
  .pick-card span {
    font-size: 18px;
    font-weight: 900;
    text-align: center;
  }
  .dialog-actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .note {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>きょうの よていボード</h1>
    <div class="subtitle">ホワイトボードに絵カードを貼るように、今日の流れを作ります</div>
  </div>
  <div class="toolbar">
    <button class="blue" onclick="toggleDoneMode()">できたチェック: <span id="doneModeText">OFF</span></button>
    <button onclick="saveBoard()">保存</button>
    <button onclick="loadBoard()">読み込み</button>
    <button class="danger" onclick="clearBoard()">ぜんぶ消す</button>
  </div>
</header>

<main>
  <section class="board" id="board"></section>
  <p class="hint">
    使い方：枠をクリック → 絵カードを選ぶ。カードを増やす場合は cards フォルダに画像を追加し、cards/cards.json に登録します。
  </p>
</main>

<dialog id="pickerDialog">
  <div class="dialog-head">
    <h2>どの絵カードにしますか？</h2>
    <button onclick="closePicker()">閉じる</button>
  </div>
  <div class="picker" id="picker"></div>
  <div class="dialog-actions">
    <button class="danger" onclick="removeCard()">この枠を空にする</button>
    <div class="note">画像一覧は cards/cards.json から読み込んでいます。</div>
  </div>
</dialog>

<script>
let cardMaster = [];

const rows = [
  { id: "morning", label: "あさ" },
  { id: "daytime", label: "ひる" },
  { id: "night", label: "よる" }
];

const SLOT_COUNT = 8;
let boardData = {};
let selectedSlotKey = null;
let doneMode = false;

async function loadCardMaster() {
  try {
    const response = await fetch("cards/cards.json?ts=" + Date.now());
    cardMaster = await response.json();

    cardMaster = cardMaster.map(card => ({
      ...card,
      image: card.image.startsWith("cards/") ? card.image : "cards/" + card.image
    }));
  } catch (error) {
    alert("cards/cards.json を読み込めませんでした。GitHub Pages上で開いてください。");
    console.error(error);
  }
}

function initBoardData() {
  rows.forEach(row => {
    for (let i = 0; i < SLOT_COUNT; i++) {
      const key = `${row.id}-${i}`;
      if (!boardData[key]) boardData[key] = { cardId: null, done: false };
    }
  });
}

function renderBoard() {
  initBoardData();
  const board = document.getElementById("board");
  board.innerHTML = "";

  rows.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "row";

    const labelEl = document.createElement("div");
    labelEl.className = "time-label";
    labelEl.textContent = row.label;
    rowEl.appendChild(labelEl);

    for (let i = 0; i < SLOT_COUNT; i++) {
      const key = `${row.id}-${i}`;
      const slot = document.createElement("div");
      const data = boardData[key] || { cardId: null, done: false };
      slot.className = "slot" + (!data.cardId ? " empty" : "") + (data.done ? " done" : "");
      slot.onclick = () => onSlotClick(key);

      if (data.cardId) {
        const card = cardMaster.find(c => c.id === data.cardId);
        if (card) {
          slot.innerHTML = `
            <div class="card">
              <img src="${card.image}" alt="${card.label}">
              <div class="label">${card.label}</div>
            </div>
          `;
        }
      }
      rowEl.appendChild(slot);
    }
    board.appendChild(rowEl);
  });
}

function renderPicker() {
  const picker = document.getElementById("picker");
  picker.innerHTML = "";
  cardMaster.forEach(card => {
    const el = document.createElement("div");
    el.className = "pick-card";
    el.innerHTML = `<img src="${card.image}" alt="${card.label}"><span>${card.label}</span>`;
    el.onclick = () => setCard(card.id);
    picker.appendChild(el);
  });
}

function onSlotClick(key) {
  selectedSlotKey = key;
  if (doneMode) {
    boardData[key].done = !boardData[key].done;
    renderBoard();
    autoSave();
    return;
  }
  renderPicker();
  document.getElementById("pickerDialog").showModal();
}

function setCard(cardId) {
  if (!selectedSlotKey) return;
  boardData[selectedSlotKey] = { cardId, done: false };
  closePicker();
  renderBoard();
  autoSave();
}

function removeCard() {
  if (!selectedSlotKey) return;
  boardData[selectedSlotKey] = { cardId: null, done: false };
  closePicker();
  renderBoard();
  autoSave();
}

function closePicker() {
  document.getElementById("pickerDialog").close();
  selectedSlotKey = null;
}

function toggleDoneMode() {
  doneMode = !doneMode;
  document.getElementById("doneModeText").textContent = doneMode ? "ON" : "OFF";
}

function saveBoard() {
  localStorage.setItem("akariScheduleBoard", JSON.stringify(boardData));
  alert("保存しました");
}

function autoSave() {
  localStorage.setItem("akariScheduleBoard", JSON.stringify(boardData));
}

function loadBoard() {
  const saved = localStorage.getItem("akariScheduleBoard");
  if (saved) {
    boardData = JSON.parse(saved);
    renderBoard();
  } else {
    renderBoard();
  }
}

function clearBoard() {
  if (!confirm("予定をすべて消しますか？")) return;
  boardData = {};
  initBoardData();
  autoSave();
  renderBoard();
}

async function startApp() {
  await loadCardMaster();
  initBoardData();
  loadBoard();
  renderBoard();
}

startApp();
</script>
</body>
</html>
